services:
  - type: web
    name: order-app
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: order-app-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://order-app-frontend.onrender.com

  - type: web
    name: order-app-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: order-app
          type: web
          property: host

databases:
  - name: order-app-db
    databaseName: order_app_db_rzk4
    user: order_app_db_rzk4_user
